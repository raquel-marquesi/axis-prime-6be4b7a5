name: Deploy Supabase Migrations & Functions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Fazer link com o projeto
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ⚠️ Sincronização automática de migrations DESATIVADA temporariamente.
      # Motivo: alinhamento manual do histórico de migrations via `supabase db pull` local.
      # NÃO reativar `supabase migration repair` automático nem `supabase db push`
      # antes de garantir que o diretório local reflete o estado remoto.
      #
      # Para reativar após o alinhamento, restaure o passo:
      #   - name: Aplicar migrations
      #     run: supabase db push --include-all
      #     env:
      #       SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      #       SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy Edge Functions
        run: |
          if [ -d "supabase/functions" ] && [ "$(ls -A supabase/functions 2>/dev/null)" ]; then
            supabase functions deploy
          else
            echo "Nenhuma Edge Function encontrada, pulando deploy."
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
