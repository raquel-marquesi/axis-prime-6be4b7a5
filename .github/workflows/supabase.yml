name: Deploy Supabase Migrations & Functions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Fazer link com o projeto
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Sincronizar histórico de migrations com o banco remoto
        run: |
          # Marcar como reverted a migration órfã que existia apenas no remoto
          supabase migration repair --status reverted 20260402155704
          # Marcar como applied todas as migrations já aplicadas diretamente no banco
          for version in \
            20260331125257 20260331130442 20260331161221 \
            20260331190054 20260331190657 20260331190724 \
            20260331192454 20260331200046 \
            20260401144004 20260401144648 20260401153145 \
            20260401154123 20260401154651 20260401155144 \
            20260401203954 20260401204626 20260401204653 \
            20260401204715 20260401220559 \
            20260402120000 20260402155706 \
            20260406144514 20260406181542 20260406191152 20260406222213 \
            20260407120801 20260407122759 20260407165309 20260407173111 \
            20260407173622 20260407180954 20260407181633 20260407184412 \
            20260407185014 20260407191003 20260407201147 \
            20260408122126 20260408132527 \
            20260409114106; do
            supabase migration repair --status applied $version || true
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Aplicar migrations
        run: supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy Edge Functions
        run: |
          if [ -d "supabase/functions" ] && [ "$(ls -A supabase/functions 2>/dev/null)" ]; then
            supabase functions deploy
          else
            echo "Nenhuma Edge Function encontrada, pulando deploy."
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
